description: >
  Distribute an Android app by uploading the binary(aab, apk)
parameters:
  path:
    type: string
    description: "Path of your app binary"
  release_note:
    type: string
    description: "This will be shown in each distribution site"
    default: ""
steps:
  - store_artifacts:
      path: <<parameters.path>>
  - run:
      name: Install fastlane
      command: sudo gem install fastlane
  - run:
      name: Generate page
      environment:
        APP_PATH: <<parameters.path>>
        RELEASE_NOTE: <<parameters.release_note>>
      command: fastlane android generate_page
  - store_artifacts:
      path: android.html
  - run:
      name: Console QR Code
      command: fastlane android generate_qr_code
  - store_artifacts:
      path: fastlane/qr_code.png
